{% extends "base.html" %}
{% block title %}API 操作 - 飲食記錄應用{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h4 fw-bold mb-0">REST API 操作</h1>
  <button id="refreshBtn" class="btn btn-outline-success">重新載入</button>
</div>

<div class="row g-3">
  <div class="col-lg-5">
    <div class="soft-panel p-4">
      <h2 class="h5 fw-bold mb-3">新增紀錄</h2>
      <form id="apiForm">
        <div class="mb-3">
          <label class="form-label" for="food_date">飲食日期</label>
          <input class="form-control" type="date" id="food_date" required>
        </div>
        <div class="mb-3">
          <label class="form-label" for="food_name">食物名稱</label>
          <input class="form-control" id="food_name" placeholder="例如：雞肉便當" required>
        </div>
        <div class="row">
          <div class="col-sm-6 mb-3">
            <label class="form-label" for="quantity">數量</label>
            <input class="form-control" id="quantity" placeholder="1 份" required>
          </div>
          <div class="col-sm-6 mb-3">
            <label class="form-label" for="calories">卡路里</label>
            <input class="form-control" type="number" min="1" max="10000" id="calories" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label" for="notes">備註</label>
          <textarea class="form-control" id="notes" rows="3"></textarea>
        </div>
        <button class="btn btn-success w-100" type="submit">POST /api/records/</button>
      </form>
    </div>
  </div>
  <div class="col-lg-7">
    <div class="soft-panel p-4 mb-3">
      <h2 class="h5 fw-bold mb-3">API 摘要</h2>
      <pre id="summaryBox" class="bg-dark text-white rounded p-3 mb-0 small">{}</pre>
    </div>
    <div class="soft-panel p-4">
      <h2 class="h5 fw-bold mb-3">GET /api/records/</h2>
      <div id="recordList" class="vstack gap-2"></div>
    </div>
  </div>
</div>

<script>
  const csrftoken = document.cookie.split('; ').find(row => row.startsWith('csrftoken='))?.split('=')[1];
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('food_date').value = today;

  async function apiFetch(url, options = {}) {
    const response = await fetch(url, {
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': csrftoken,
        ...(options.headers || {})
      },
      ...options
    });
    if (!response.ok) {
      const body = await response.text();
      throw new Error(body || response.statusText);
    }
    if (response.status === 204) return null;
    return response.json();
  }

  async function loadData() {
    const [summary, records] = await Promise.all([
      apiFetch('{% url "food_tracker:food_summary_api" %}'),
      apiFetch('/api/records/')
    ]);
    document.getElementById('summaryBox').textContent = JSON.stringify(summary, null, 2);
    const list = document.getElementById('recordList');
    list.innerHTML = '';
    if (!records.length) {
      list.innerHTML = '<div class="alert alert-info mb-0">目前沒有紀錄。</div>';
      return;
    }
    records.forEach(record => {
      const item = document.createElement('div');
      item.className = 'border rounded p-3 d-flex justify-content-between gap-3 align-items-start';
      item.innerHTML = `
        <div>
          <div class="fw-bold">${record.food_name} <span class="badge text-bg-success">${record.calories} kcal</span></div>
          <div class="text-muted small">${record.food_date} · ${record.quantity}</div>
          <div class="small">${record.notes || ''}</div>
        </div>
        <button class="btn btn-outline-danger btn-sm" data-id="${record.id}">DELETE</button>
      `;
      list.appendChild(item);
    });
  }

  document.getElementById('apiForm').addEventListener('submit', async event => {
    event.preventDefault();
    await apiFetch('/api/records/', {
      method: 'POST',
      body: JSON.stringify({
        food_date: document.getElementById('food_date').value,
        food_name: document.getElementById('food_name').value,
        quantity: document.getElementById('quantity').value,
        calories: Number(document.getElementById('calories').value),
        notes: document.getElementById('notes').value
      })
    });
    event.target.reset();
    document.getElementById('food_date').value = today;
    await loadData();
  });

  document.getElementById('recordList').addEventListener('click', async event => {
    if (!event.target.dataset.id) return;
    await apiFetch(`/api/records/${event.target.dataset.id}/`, { method: 'DELETE' });
    await loadData();
  });

  document.getElementById('refreshBtn').addEventListener('click', loadData);
  loadData().catch(error => {
    document.getElementById('recordList').innerHTML = `<div class="alert alert-danger">${error.message}</div>`;
  });
</script>
{% endblock %}
