{% extends "base.html" %}
{% block title %}使用者登入 - 飲食記錄應用{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="soft-panel">
      <div class="card-body p-4">
        <div class="section-bar justify-content-center">
          <span class="icon-badge"><i class="bi bi-box-arrow-in-right"></i></span>
          <h2 class="card-title mb-0 page-title">登入</h2>
        </div>
        
        {% if messages %}
          {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
          {% endfor %}
        {% endif %}

        <form method="post">
          {% csrf_token %}
          
          <div class="mb-3">
            <label for="username" class="form-label">使用者名稱</label>
            <input type="text" class="form-control" id="username" name="username" required placeholder="請輸入使用者名稱">
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">密碼</label>
            <input type="password" class="form-control" id="password" name="password" required placeholder="請輸入密碼">
          </div>

          <button type="submit" class="btn btn-success w-100"><i class="bi bi-box-arrow-in-right me-1"></i>登入</button>
        </form>

        <div class="text-center mt-3">
          <p class="text-muted mb-0">還沒有帳號？<a href="{% url 'food_tracker:register' %}">註冊</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
